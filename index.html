<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP2 Canvas - Rauch 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container mt-4">
    <div class="mb-2 d-flex gap-2 align-items-center">
        <button id="btnPencil" class="btn btn-secondary">Lápiz</button>
        <button id="btnEraser" class="btn btn-secondary">Goma</button>
        <input type="color" id="colorPicker" value="#000000">
        <button id="btnClear" class="btn btn-danger">Limpiar</button>
        <input type="file" id="fileInput" accept="image/*" class="form-control w-auto">
        <button id="btnGrayscale" class="btn btn-secondary">Blanco y Negro</button>
    </div>
    <canvas id="myCanvas" width="800" height="600" style="border: 1px solid black;"></canvas>
</div>
<script type="module" src="/src/Main.ts"></script>
</body>
</html>
